<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Global Boxing Leaderboard</title>
    <link rel="stylesheet" href="css/style.css" />
    <!-- Підключаємо Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    <header class="boxer-header">
      <a href="index.html" class="back-link">← Back to Dashboard</a>
      <h1 id="leaderboard-title">P4P Leaderboard</h1>
      <span class="country-badge">TOP 17</span>
    </header>

    <main class="content">
      <!-- Блок кнопок перемикання рейтингів -->
      <div class="leaderboard-controls">
        <button class="rank-btn active" data-mode="points">Total Points</button>
        <button class="rank-btn" data-mode="avg">AVG Per Fight</button>
        <button class="rank-btn" data-mode="s-tier">S / S+ Wins</button>
      </div>

      <!-- Контейнер для великої стовпчикової діаграми -->
      <div class="chart-wrapper leaderboard-wrapper">
        <canvas id="leaderboardChart"></canvas>
      </div>
    </main>

    <script src="js/leaderboard.js"></script>
  </body>
</html>
